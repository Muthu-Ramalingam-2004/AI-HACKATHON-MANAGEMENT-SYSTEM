version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hackathon_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: hackathon_backend
    restart: always
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=hackathon_db
      - POSTGRES_PORT=5432
      - SECRET_KEY=supersecretkeychangeitinproduction1234567890!
      - UPLOAD_DIR=uploads
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: hackathon_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
